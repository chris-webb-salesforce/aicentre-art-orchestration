  acceleration: 200
  travel_acceleration: 200
  jerk: 7.0
drawing:
  x_min: -53.0
  x_max: 54.0
  y_min: 232.0
  y_max: 337.0
  size_mm: 120
  z_up: -71.0
  z_down: -76.0
  flip_x: true
  flip_y: false
  safe_position:
    x: 0.0
    y: 300.0
    z: 30.0
arms:
- id: arm-1
  label: Station 1
  dexarm:
    port: /dev/tty.usbmodem3187378532331
  drawing:
    z_up: -71.0
    z_down: -76.0
- id: arm-2
  label: Station 2
  dexarm:
    port: /dev/tty.usbmodem3062338934381
    feedrate: 6000
    travel_feedrate: 4000
    acceleration: 200
    travel_acceleration: 200
    jerk: 5.0
  drawing:
    z_up: -69.5
    z_down: -74.5
logo:
  enabled: false
  path: config/logo.gcode
  x_min: -30.0
  x_max: 30.0
  y_min: 345.0
  y_max: 385.0
camera:
  index: 0
  width: 640
  height: 480
  capture_width: 1280
  capture_height: 720
face_tracking:
  center_threshold: 0.1
  stable_duration: 1.5
  max_tracking_time: 30.0
  min_face_size: 0.1
openai:
  model: gpt-image-1.5
  default_style: minimal
  size: 1024x1024
  max_retries: 3
  retry_delay: 5.0
  reference_image: config/reference.png
  styles:
    simple:
      name: Simple Line Art
      prompt: 'Transform this portrait into a simple, minimalist cartoon line drawing.

        Use only simple, clean, flowing black lines on a pure white background.

        The sketch should be in a playful but realistic style and look like a hand-drawn
        cartoon that resembles the portrait.

        No shading, no filling, just clean single line work. Make the lines a single
        pixel thick and as thin as possible. Every line should be the same thickness.

        Where possible, join lines, i.e. hair and beards.

        Accessories like glasses and earings should not be filled in.

        *Keep the image simple and with only thin 1px lines*

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    minimal:
      name: Minimalist Line Art
      prompt: 'Transform this face portrait into a minimalist single continuous line
        drawing.

        Focus entirely on the face - capture the eyes, nose, mouth, and facial outline.

        Use only simple, clean, flowing black lines on a pure white background.

        Minimal details, abstract but recognizable. No shading, no filling.

        Make the lines a single pixel thick. The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    vangogh:
      name: Van Gogh Style
      prompt: 'Transform this face portrait into a Van Gogh-inspired line drawing.

        Focus on the face with expressive, swirling line work characteristic of Van
        Gogh.

        Use bold, confident black lines on white background with flowing, energetic
        strokes.

        Make sure there is no background to this image.

        Capture the emotion and movement. No shading or color, just expressive lines.

        Make all lines as thin as possible, ideally 1 pixel thick.

        Do simplify the lines, the image shouldn''t be too dense.

        The face should fill most of the image.

        There should be no background to the image.
        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    ghibli:
      name: Studio Ghibli
      prompt: 'Transform this face portrait into a Studio Ghibli anime-style line
        drawing.

        Focus on the face with soft, gentle lines and large expressive eyes with absolutely
        no filling colour.

        Clean black lines on white background, capturing warmth and whimsy.

        Simple but charming with attention to eyes and expression.

        Make all lines as thin as possible, ideally 1 pixel thick. No shading or color.

        The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    picasso:
      name: Picasso Cubist
      prompt: 'Transform this face portrait into a Picasso cubist-style line drawing.

        Focus on the face with geometric, angular interpretations of features.

        Abstract the face into shapes and planes while keeping it recognizable.

        Black lines on white background. No shading or filling.

        Make all lines as thin as possible, ideally 1 pixel thick.

        The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    sketch:
      name: Quick Sketch
      prompt: 'Transform this face portrait into a quick artist''s sketch.

        Focus on the face with loose, gestural black lines on white background.

        Capture the essence with minimal strokes like a 30-second figure drawing.

        Raw and expressive, not polished. No shading, just confident line work.

        Make all lines as thin as possible, ideally 1 pixel thick.

        The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    caricature:
      name: Caricature
      prompt: 'Transform this face portrait into a caricature-style line drawing.

        Focus on the face, exaggerating distinctive features in a playful way.

        Black lines on white background.

        Fun and recognizable with emphasized characteristics.

        Make all lines as thin as possible, ideally 1 pixel thick. No shading or filling.

        The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    geometric:
      name: Geometric
      prompt: 'Transform this face portrait into a geometric line drawing.

        Focus on the face using only straight lines and angular shapes.

        Low-poly style with black lines on white background.

        Abstract but recognizable facial structure. No curves, no shading.

        Make all lines as thin as possible, ideally 1 pixel thick.

        The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
    contour:
      name: Blind Contour
      prompt: 'Transform this face portrait into a blind contour-style line drawing.

        Focus on the face with one continuous wandering line that traces features.

        Imperfect, wobbly black line on white background like drawing without looking.

        Charming and authentic with natural imperfections.

        Make the line as thin as possible, ideally 1 pixel thick.

        The face should fill most of the image.

        '
      contour:
        method: hybrid
        skeleton_simplify: 1.0
        canny_low: 50
        canny_high: 100
        simplify_epsilon: 0.0
        min_length: 1.0
        min_area: 500
        min_contour_points: 5
        merge_enabled: false
        merge_distance: 30.0
        region_aware: true
contour_extraction:
  method: canny
  canny_low: 15
  canny_high: 60
  min_area: 20
  simplify_epsilon: 3.0
  blur_kernel: 3
  min_contour_points: 3
  thickness_threshold: 5
  density_threshold: 0.5
  skeleton_simplify: 0.5
  thinning_threshold: 127
  thinning_cleanup: true
  thinning_cleanup_kernel: 2
  min_length: 5.0
  merge_distance: 5.0
  merge_enabled: false
  region_aware: false
  detail_simplify_epsilon: 0.3
  detail_min_length: 3.0
  detail_min_area: 10
  detail_region_padding: 20
path_optimization:
  enabled: true
  min_travel_distance: 5.0
personality:
  practice_strokes:
    enabled: true
    height_offset: 20.0
    radius: 15.0
    speed: 1500
  curious_tilts:
    enabled: true
    angle_range: 5.0
    interval_min: 3.0
    interval_max: 6.0
system:
  output_dir: output
  log_level: INFO
