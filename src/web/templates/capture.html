<!DOCTYPE html>
<html lang="en" class="{{ 'light' if light_mode else '' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Portrait Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* ---- Full-screen camera ---- */
        .camera-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-error {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            background: #1a1a2e;
        }

        .camera-error.show { display: flex; }

        .camera-error p {
            font-size: 1.1rem;
            color: #aaa;
            line-height: 1.6;
        }

        /* ---- Captured preview overlay ---- */
        #captured-preview {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 1;
        }

        #captured-preview.show { display: block; }

        #captured-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ---- Countdown ---- */
        .countdown-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .countdown-number {
            font-size: 8rem;
            font-weight: 200;
            color: #fff;
            text-shadow: 0 0 40px rgba(0,0,0,0.6);
            animation: countdownPop 0.8s ease-out forwards;
        }

        @keyframes countdownPop {
            0% { transform: scale(1.6); opacity: 0; }
            20% { transform: scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        /* ---- Connection bar ---- */
        .connection-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            z-index: 100;
            display: none;
        }

        .connection-bar.disconnected {
            display: block;
            background: #e74c3c;
            color: #fff;
        }

        .connection-bar.no-robot {
            display: block;
            background: #f39c12;
            color: #fff;
        }

        /* ---- Logo ---- */
        .logo {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            pointer-events: none;
        }

        .logo img {
            height: 40px;
            width: auto;
            opacity: 0.9;
        }

        /* ---- Bottom controls ---- */
        .controls-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 20;
        }

        .capture-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: transparent;
            cursor: pointer;
            position: relative;
            -webkit-appearance: none;
            flex-shrink: 0;
        }

        .capture-btn::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.1s;
        }

        .capture-btn:active::after { transform: scale(0.9); }
        .capture-btn:disabled { opacity: 0.3; pointer-events: none; }

        .btn {
            font-size: 15px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            letter-spacing: 0.5px;
            -webkit-appearance: none;
        }

        .btn-secondary { background: rgba(255,255,255,0.15); color: #ccc; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn:disabled { opacity: 0.4; pointer-events: none; }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .review-controls { display: none; }
        .review-controls.show { display: contents; }

        /* ---- Arm status cards (overlay) ---- */
        .arm-cards {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: calc(100% - 120px);
            overflow-y: auto;
            pointer-events: none;
        }

        .arm-card {
            background: rgba(15, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 16px;
            min-width: 200px;
            pointer-events: auto;
            transition: border-color 0.3s ease;
        }

        .arm-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .arm-card-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .arm-card-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #ddd;
            flex: 1;
        }

        .arm-card-status {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
        }

        /* Status colors */
        .arm-card[data-status="idle"] .arm-card-dot { background: #27ae60; }
        .arm-card[data-status="idle"] { border-color: rgba(39,174,96,0.25); }

        .arm-card[data-status="processing"] .arm-card-dot { background: #f39c12; }
        .arm-card[data-status="processing"] { border-color: rgba(243,156,18,0.25); }

        .arm-card[data-status="drawing"] .arm-card-dot { background: #667eea; }
        .arm-card[data-status="drawing"] { border-color: rgba(102,126,234,0.3); }

        .arm-card[data-status="complete"] .arm-card-dot { background: #27ae60; }
        .arm-card[data-status="complete"] { border-color: rgba(39,174,96,0.3); }

        .arm-card[data-status="error"] .arm-card-dot { background: #e74c3c; }
        .arm-card[data-status="error"] { border-color: rgba(231,76,60,0.3); }

        .arm-card[data-status="testing"] .arm-card-dot { background: #9b59b6; }
        .arm-card[data-status="testing"] { border-color: rgba(155,89,182,0.3); }

        /* Progress bar inside card */
        .arm-card-progress {
            display: none;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            margin: 8px 0 4px;
            overflow: hidden;
        }

        .arm-card-progress.show { display: block; }

        .arm-card-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #9b6dff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .arm-card-message {
            font-size: 0.7rem;
            color: #777;
            margin-top: 4px;
            min-height: 1em;
        }

        /* Action button inside card */
        .arm-card-action {
            margin-top: 10px;
        }

        .arm-card-btn {
            width: 100%;
            font-size: 0.72rem;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            -webkit-appearance: none;
        }

        .arm-card-btn:active { transform: scale(0.97); }

        .arm-card-btn.confirm-btn {
            background: #27ae60;
            color: #fff;
        }

        .arm-card-btn.reset-btn {
            background: rgba(231,76,60,0.2);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.3);
        }

        .arm-card-btn.force-btn {
            background: rgba(255,255,255,0.1);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.65rem;
            margin-top: 6px;
        }

        /* Queue indicator */
        .queue-indicator {
            display: none;
            background: rgba(243,156,18,0.15);
            border: 1px solid rgba(243,156,18,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #f39c12;
            text-align: center;
            pointer-events: auto;
        }

        .queue-indicator.show { display: block; }

        /* ---- Instructions card ---- */
        .instructions-card {
            position: fixed;
            z-index: 50;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 16px 18px;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }

        .instructions-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .instructions-steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .instruction-step {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-number {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: #fff;
        }

        .step-text {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.3;
        }

        @media (orientation: portrait) {
            .instructions-card {
                bottom: 120px;
                left: 16px;
                right: 16px;
            }

            .instructions-steps {
                flex-direction: row;
                gap: 0;
            }

            .instruction-step {
                flex: 1;
                flex-direction: column;
                text-align: center;
                gap: 6px;
            }

            .instructions-title { text-align: center; }

            .arm-cards {
                top: auto;
                bottom: 100px;
                right: 10px;
                left: 10px;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: flex-end;
                max-height: none;
            }

            .arm-card { min-width: 160px; }
        }

        @media (orientation: landscape) {
            .instructions-card {
                top: 24px;
                left: 24px;
                max-width: 220px;
            }
        }

        /* ---- Light Mode ---- */
        html.light, html.light body {
            background: #f5f5f7;
            color: #1a1a1a;
        }

        html.light .arm-card {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(0,0,0,0.1);
        }

        html.light .arm-card-name { color: #333; }
        html.light .arm-card-status { color: #888; }
        html.light .arm-card-message { color: #999; }

        html.light .arm-card-progress {
            background: rgba(0,0,0,0.06);
        }

        html.light .queue-indicator {
            background: rgba(243,156,18,0.1);
        }

        html.light .connection-bar.disconnected { background: #e74c3c; }
        html.light .connection-bar.no-robot { background: #f39c12; }

        html.light .controls-bar {
            background: rgba(255,255,255,0.85);
            border-top: 1px solid rgba(0,0,0,0.08);
        }

        html.light .capture-btn {
            border-color: #333;
        }

        html.light .capture-btn::after {
            background: #333;
        }

        html.light .btn-secondary {
            background: #e8e8ed;
            color: #333;
        }

        html.light .countdown-number {
            color: #1a1a1a;
            text-shadow: 0 0 40px rgba(255,255,255,0.6);
        }

        html.light .camera-error { background: #f5f5f7; }
        html.light .camera-error p { color: #666; }

        html.light .instructions-card {
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.08);
        }

        html.light .instructions-title { color: rgba(0,0,0,0.4); }
        html.light .step-text { color: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <!-- Logo -->
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
    </div>

    <!-- Connection bar -->
    <div class="connection-bar" id="connectionBar"></div>

    <!-- Instructions -->
    <div class="instructions-card" id="instructionsCard">
        <div class="instructions-title">How it works</div>
        <div class="instructions-steps">
            <div class="instruction-step">
                <div class="step-number">1</div>
                <div class="step-text">Strike a pose</div>
            </div>
            <div class="instruction-step">
                <div class="step-number">2</div>
                <div class="step-text">Tap to capture</div>
            </div>
            <div class="instruction-step">
                <div class="step-number">3</div>
                <div class="step-text">Review &amp; submit</div>
            </div>
            <div class="instruction-step">
                <div class="step-number">4</div>
                <div class="step-text">Watch it draw</div>
            </div>
        </div>
    </div>

    <!-- Full-screen camera (always visible) -->
    <div class="camera-layer">
        <video id="camera-video" playsinline autoplay muted></video>
        <div class="camera-error" id="cameraError">
            <p>Unable to access camera.<br>Please allow camera permissions and reload the page.</p>
        </div>
    </div>

    <!-- Captured preview overlay -->
    <div id="captured-preview">
        <img id="preview-img" src="" alt="Captured photo">
    </div>

    <!-- Countdown overlay -->
    <div class="countdown-overlay" id="countdownOverlay" style="display: none;"></div>

    <!-- Arm status cards (top right overlay) -->
    <div class="arm-cards" id="armCards"></div>

    <!-- Bottom controls -->
    <div class="controls-bar" id="controlsBar">
        <button class="capture-btn" id="captureBtn" aria-label="Take photo"></button>
        <div class="review-controls" id="reviewControls">
            <button class="btn btn-secondary" id="retakeBtn">Retake</button>
            <button class="btn btn-primary" id="submitBtn">Submit</button>
        </div>
    </div>

    <!-- Hidden canvas for photo capture -->
    <canvas id="captureCanvas" style="display: none;"></canvas>

    <script>
        // --- State ---
        const selectedStyle = 'simple';
        let capturedPhotoData = null;
        let submitPhotoData = null;
        let cameraStream = null;
        let robotConnected = false;
        let myJobId = null;
        let armsState = {};  // arm_id -> { status, label, message, percent }

        // --- Elements ---
        const video = document.getElementById('camera-video');
        const captureBtn = document.getElementById('captureBtn');
        const reviewControls = document.getElementById('reviewControls');
        const captureCanvas = document.getElementById('captureCanvas');
        const previewEl = document.getElementById('captured-preview');
        const previewImg = document.getElementById('preview-img');
        const retakeBtn = document.getElementById('retakeBtn');
        const submitBtn = document.getElementById('submitBtn');
        const connectionBar = document.getElementById('connectionBar');
        const armCards = document.getElementById('armCards');

        // --- Camera ---
        async function startCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = cameraStream;
                await video.play();
                document.getElementById('cameraError').classList.remove('show');
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('cameraError').classList.add('show');
            }
        }

        let countdownActive = false;

        function capturePhoto() {
            if (!cameraStream || countdownActive) return;
            countdownActive = true;
            captureBtn.style.pointerEvents = 'none';
            captureBtn.style.opacity = '0.4';

            const overlay = document.getElementById('countdownOverlay');
            let count = 3;

            function tick() {
                overlay.style.display = 'flex';
                overlay.innerHTML = `<div class="countdown-number">${count}</div>`;

                if (count > 1) {
                    count--;
                    setTimeout(tick, 900);
                } else {
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        overlay.innerHTML = '';
                        snapPhoto();
                        countdownActive = false;
                        captureBtn.style.pointerEvents = '';
                        captureBtn.style.opacity = '';
                    }, 900);
                }
            }

            tick();
        }

        function snapPhoto() {
            const track = cameraStream.getVideoTracks()[0];
            const settings = track.getSettings();
            const w = settings.width || video.videoWidth;
            const h = settings.height || video.videoHeight;

            captureCanvas.width = w;
            captureCanvas.height = h;
            const ctx = captureCanvas.getContext('2d');

            ctx.save();
            ctx.translate(w, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, w, h);
            ctx.restore();

            capturedPhotoData = captureCanvas.toDataURL('image/jpeg', 0.92);

            // Downsized for submission
            const maxDim = 1024;
            let sw = w, sh = h;
            if (w > h && w > maxDim) { sw = maxDim; sh = Math.round(h * maxDim / w); }
            else if (h > maxDim) { sh = maxDim; sw = Math.round(w * maxDim / h); }

            if (sw !== w || sh !== h) {
                captureCanvas.width = sw;
                captureCanvas.height = sh;
                const sctx = captureCanvas.getContext('2d');
                sctx.save();
                sctx.translate(sw, 0);
                sctx.scale(-1, 1);
                sctx.drawImage(video, 0, 0, sw, sh);
                sctx.restore();
                submitPhotoData = captureCanvas.toDataURL('image/jpeg', 0.85);
            } else {
                submitPhotoData = capturedPhotoData;
            }

            previewImg.src = capturedPhotoData;
            previewEl.classList.add('show');
            captureBtn.style.display = 'none';
            reviewControls.classList.add('show');
        }

        function retakePhoto() {
            capturedPhotoData = null;
            submitPhotoData = null;
            previewEl.classList.remove('show');
            reviewControls.classList.remove('show');
            captureBtn.style.display = '';
        }

        function submitPhoto() {
            if (!submitPhotoData) return;

            socket.emit('submit_photo', {
                photo: submitPhotoData,
                style: selectedStyle
            });

            // Return to camera view
            retakePhoto();
        }

        // --- SocketIO ---
        const socket = io('/capture');

        socket.on('connect', () => {
            connectionBar.className = 'connection-bar';
            connectionBar.textContent = '';
        });

        socket.on('disconnect', () => {
            connectionBar.className = 'connection-bar disconnected';
            connectionBar.textContent = 'Connection lost - reconnecting...';
        });

        socket.on('overview', (data) => {
            robotConnected = data.any_connected;
            updateConnectionUI();

            // Sync arm states from overview
            const armIds = new Set();
            (data.arms || []).forEach(a => {
                armIds.add(a.arm_id);
                if (!armsState[a.arm_id]) {
                    armsState[a.arm_id] = { status: a.status, label: a.label, message: '', percent: 0 };
                } else {
                    armsState[a.arm_id].status = a.status;
                    armsState[a.arm_id].label = a.label;
                }
            });
            // Remove disconnected arms
            Object.keys(armsState).forEach(id => {
                if (!armIds.has(id)) delete armsState[id];
            });

            renderArmCards(data.queue_depth);
        });

        socket.on('queued', (data) => {
            myJobId = data.job_id;
        });

        socket.on('status', (data) => {
            if (!data.arm_id) return;

            // Update arm state
            if (!armsState[data.arm_id]) {
                armsState[data.arm_id] = { status: data.status, label: data.label || data.arm_id, message: '', percent: 0 };
            }

            const arm = armsState[data.arm_id];
            arm.status = data.status;
            arm.message = data.message || '';
            arm.percent = data.percent || 0;
            if (data.label) arm.label = data.label;

            renderArmCards();
        });

        socket.on('error', (data) => {
            alert(data.message || 'An error occurred');
        });

        function updateConnectionUI() {
            if (!robotConnected) {
                connectionBar.className = 'connection-bar no-robot';
                connectionBar.textContent = 'All robots offline';
                submitBtn.disabled = true;
                captureBtn.disabled = true;
            } else {
                connectionBar.className = 'connection-bar';
                connectionBar.textContent = '';
                submitBtn.disabled = false;
                captureBtn.disabled = false;
            }
        }

        // --- Arm card rendering ---
        function renderArmCards(queueDepth) {
            const statusLabels = {
                idle: 'Ready',
                processing: 'Generating...',
                drawing: 'Drawing',
                complete: 'Complete',
                error: 'Error',
                testing: 'Testing',
            };

            const statusColors = {
                idle: '#27ae60',
                processing: '#f39c12',
                drawing: '#667eea',
                complete: '#27ae60',
                error: '#e74c3c',
                testing: '#9b59b6',
            };

            const ids = Object.keys(armsState);
            if (ids.length === 0) {
                armCards.innerHTML = '';
                return;
            }

            let html = '';
            ids.forEach(id => {
                const a = armsState[id];
                const showProgress = (a.status === 'drawing' || a.status === 'processing');
                const showConfirm = (a.status === 'complete');
                const showReset = (a.status === 'error');
                const showForce = (a.status === 'testing' || a.status === 'processing' || a.status === 'drawing');

                html += `<div class="arm-card" data-status="${a.status}">
                    <div class="arm-card-header">
                        <div class="arm-card-dot"></div>
                        <div class="arm-card-name">${a.label || id}</div>
                    </div>
                    <div class="arm-card-status">${statusLabels[a.status] || a.status}</div>
                    <div class="arm-card-progress ${showProgress ? 'show' : ''}">
                        <div class="arm-card-progress-fill" style="width: ${a.percent || 0}%"></div>
                    </div>
                    ${a.message ? `<div class="arm-card-message">${a.message}</div>` : ''}
                    ${showConfirm ? `<div class="arm-card-action">
                        <button class="arm-card-btn confirm-btn" onclick="confirmReady('${id}')">Confirm Ready</button>
                    </div>` : ''}
                    ${showReset ? `<div class="arm-card-action">
                        <button class="arm-card-btn reset-btn" onclick="confirmReady('${id}')">Reset</button>
                    </div>` : ''}
                    ${showForce ? `<div class="arm-card-action">
                        <button class="arm-card-btn force-btn" onclick="forceReset('${id}')">Force Reset</button>
                    </div>` : ''}
                </div>`;
            });

            // Queue indicator
            if (queueDepth > 0) {
                html += `<div class="queue-indicator show">${queueDepth} job${queueDepth > 1 ? 's' : ''} in queue</div>`;
            }

            armCards.innerHTML = html;
        }

        function confirmReady(armId) {
            socket.emit('confirm_ready', { arm_id: armId });
        }

        function forceReset(armId) {
            socket.emit('force_reset', { arm_id: armId });
        }

        // --- Event Listeners ---
        captureBtn.addEventListener('click', capturePhoto);
        retakeBtn.addEventListener('click', retakePhoto);
        submitBtn.addEventListener('click', submitPhoto);

        // --- Init ---
        startCamera();
    </script>
</body>
</html>
